name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests (Python/pytest) ────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Themis native library
        # pythemis requires the native libthemis library
        run: |
          curl -fsSL https://pkgs-ce.cossacklabs.com/gpg | \
            sudo gpg --dearmor -o /usr/share/keyrings/cossacklabs-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cossacklabs-archive-keyring.gpg] \
            https://pkgs-ce.cossacklabs.com/stable/ubuntu focal main" | \
            sudo tee /etc/apt/sources.list.d/cossacklabs.list
          sudo apt-get update -qq
          sudo apt-get install -y libthemis-dev

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          # 32-byte Themis test key (DO NOT use in production!)
          THEMIS_MASTER_KEY: "OmB78RIPigdqqneNpigCa62yOiN6x2TE-NyyeZre7y4="
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET_KEY: "test-secret-key-for-ci-tests-only-32chars!!"
          REDIS_URL: "redis://localhost:6379/0"
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ── Frontend Tests (Vitest) ──────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node.js dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ── TypeScript Type Check ────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node.js dependencies
        working-directory: frontend
        run: npm install

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run type-check
