name: Publish Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Only run if CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          load: true
          build-args: |
            APP_UID=568
            APP_GID=568
          tags: |
            yuriykuznetsov/grocynutrients:backend
            yuriykuznetsov/grocynutrients:backend-${{ env.SHORT_SHA }}

      - name: Build frontend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          load: true
          tags: |
            yuriykuznetsov/grocynutrients:frontend
            yuriykuznetsov/grocynutrients:frontend-${{ env.SHORT_SHA }}

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: yuriykuznetsov/grocynutrients:backend
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: yuriykuznetsov/grocynutrients:frontend
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push images
        run: |
          docker push yuriykuznetsov/grocynutrients:backend
          docker push yuriykuznetsov/grocynutrients:backend-${{ env.SHORT_SHA }}
          docker push yuriykuznetsov/grocynutrients:frontend
          docker push yuriykuznetsov/grocynutrients:frontend-${{ env.SHORT_SHA }}
