name: Publish Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Only run if CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          load: true
          build-args: |
            APP_UID=568
            APP_GID=568
          tags: |
            yuriykuznetsov/grocynutrients:backend
            yuriykuznetsov/grocynutrients:backend-${{ env.SHORT_SHA }}

      - name: Build frontend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          load: true
          tags: |
            yuriykuznetsov/grocynutrients:frontend
            yuriykuznetsov/grocynutrients:frontend-${{ env.SHORT_SHA }}

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: yuriykuznetsov/grocynutrients:backend
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: yuriykuznetsov/grocynutrients:frontend
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push images
        run: |
          docker push yuriykuznetsov/grocynutrients:backend
          docker push yuriykuznetsov/grocynutrients:backend-${{ env.SHORT_SHA }}
          docker push yuriykuznetsov/grocynutrients:frontend
          docker push yuriykuznetsov/grocynutrients:frontend-${{ env.SHORT_SHA }}
