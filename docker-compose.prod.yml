# Production overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build: !reset null
    image: yuriykuznetsov/grocystat:backend
    user: "${APP_UID:-568}:${APP_GID:-568}"
    ports:
      - "8000:8000"
    volumes: !reset []
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  celery_worker:
    build: !reset null
    image: yuriykuznetsov/grocystat:backend
    user: "${APP_UID:-568}:${APP_GID:-568}"
    volumes: !reset []
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    command: celery -A app.tasks worker --loglevel=warning
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  celery_beat:
    build: !reset null
    image: yuriykuznetsov/grocystat:backend
    user: "${APP_UID:-568}:${APP_GID:-568}"
    volumes: !reset []
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    command: celery -A app.tasks beat --loglevel=warning --schedule=/app/celerybeat/celerybeat-schedule
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  frontend:
    build: !reset null
    image: yuriykuznetsov/grocystat:frontend
    user: "${APP_UID:-568}:${APP_GID:-568}"
    volumes: !reset []
    command: !reset null
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  db:
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  redis_data:
