# Development overrides: hot-reload via volume mounts, debug logging.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  backend:
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        while ! nc -z db 5432; do sleep 1; done &&
        echo 'Database is ready!' &&
        sleep 2 &&
        python -c 'from app.db.init_db import init_db; init_db()' &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: celery -A app.tasks worker --loglevel=debug

  celery_beat:
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: celery -A app.tasks beat --loglevel=debug

  frontend:
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
