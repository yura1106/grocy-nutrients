# Development overrides: hot-reload via volume mounts, debug logging.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  backend:
    user: "1000:1000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - PYTHONPATH=/app
    ports:
      - "9001:9001"
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        while ! nc -z db 5432; do sleep 1; done &&
        echo 'Database is ready!' &&
        sleep 2 &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    user: "1000:1000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
    volumes:
      - ./backend:/app
    command: celery -A app.tasks worker --loglevel=debug

  celery_beat:
    user: "1000:1000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
    volumes:
      - ./backend:/app
    command: celery -A app.tasks beat --loglevel=debug

  frontend:
    user: "1000:1000"
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: build
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host
