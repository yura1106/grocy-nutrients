# Dev environment. Usage:
#   Dev:  docker compose up --build
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        INSTALL_DEV: "true"
    user: "1000:1000"
    ports:
      - "8000:8000"
      - "9001:9001"
    working_dir: /app
    env_file:
      - .env.backend
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocy_stat
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        INSTALL_DEV: "true"
    user: "1000:1000"
    command: celery -A app.tasks worker --loglevel=debug
    env_file:
      - .env.backend
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocy_stat
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        INSTALL_DEV: "true"
    user: "1000:1000"
    command: celery -A app.tasks beat --loglevel=debug
    env_file:
      - .env.backend
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocy_stat
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: build
    user: "1000:1000"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host
    depends_on:
      - backend
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=grocy_stat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    external: true
