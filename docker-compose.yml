version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    working_dir: /app
    env_file:
      - .env.backend
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocy_stat
      - DEBUG=True
    restart: always
    depends_on:
      - db
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: always
    command: celery -A app.tasks.celery worker --loglevel=info
    depends_on:
      - backend
      - rabbitmq
      - redis
    env_file:
      - .env.backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocy_stat
      - DEBUG=False
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"  # AMQP protocol port
      - "15672:15672"  # Management interface port
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data: 