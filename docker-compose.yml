# Base services shared between dev and prod.
# Usage:
#   Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    working_dir: /app
    env_file:
      - .env.backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocy_stat
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # Celery worker — executes async tasks:
  #   - Heavy sync operations offloaded from the API (product sync for all users)
  #   - Scheduled jobs triggered by celery_beat (daily product sync at 04:00)
  #   - Any future background work: report generation, notifications, etc.
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: celery -A app.tasks worker --loglevel=warning
    env_file:
      - .env.backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocy_stat
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # Celery beat — cron scheduler. Sends periodic tasks to the worker queue.
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: celery -A app.tasks beat --loglevel=warning
    env_file:
      - .env.backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocy_stat
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=grocy_stat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    external: true
